title: How we support Open Access
short-title: Fair
icon-url: images/icons/fair.svg
description: CORE has stood at the forefront of the open access movement, not as a passive service, but as an active builder of open scholarly infrastructure that enables research ideas to be Findable, Accessible, Interoperable and Reusable (FAIR) in a free, visible, and inclusive manner. We don’t just support open access. We are open access.
