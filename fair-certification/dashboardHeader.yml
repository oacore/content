  title: FAIR Repository Certification
  icon: /images/fairLogo.svg
  image: /images/fairCertificate.svg
  label: Coming soon
  description: |
    FAIR Certification offers an opportunity for data providers (publications repositories, journals, data repositories, etc.) to demonstrate and evidence their adherence to the widely recognised FAIR (Findable, Accessible, Interoperable, Reusable) principles. A FAIR-compliant repository becomes a dynamic, machine-actionable component of the global research infrastructure, maximising the impact and reusability of the research it hosts.
