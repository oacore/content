features:
  - title: Why FAIR repositories?
    description: |
      FAIR repositories ensure that research data maximises its value while promoting transparency and innovation in open access.
  - title: Why FAIR Certificate?
    description: |
      Many data providers suffer from low discoverability of their outputs due to misconfigured technology. Our certification validates that your platform adheres to the FAIR principles.
  - title: Align with best technology standards and practices
    description: |
      The only data-driven FAIR certification programme for repositories. Essential especially for publication repositories.
  - title: Trusted by the academic community
    description: |
      Evidence alignment with FAIR by obtaining a certificate from CORE, trusted by leading academic institutions.
