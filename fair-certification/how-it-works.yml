how-it-works:
  title: Why it's important
  image: /images/workCertificate.svg
  description: |
    Aligning with FAIR is crucial for ensuring that repository content is easily discoverable, accessible, interoperable and reusable within scholarly infrastructures.
    Our FAIR Certification programme consists of a set of objective data-driven automated checks of your platform directly assessing FAIRness.
    Our easy to navigate certification process is fully technology-supported, objective and provides specific guidance and recommendations leading to tangible improvements, ensuring that your platform aligns with best technology and content management practices.
